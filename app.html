<!DOCTYPE html>
<html>
  <head {{ HEAD_ATTRS }}>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    {{ HEAD }}
    <!-- Taboola Pixel Code -->
    <script type="text/javascript">
      window._tfa = window._tfa || [];
      window._tfa.push({ notify: "event", name: "page_view", id: 1891183 });
      !(function (t, f, a, x) {
        if (!document.getElementById(x)) {
          t.async = 1;
          t.src = a;
          t.id = x;
          f.parentNode.insertBefore(t, f);
        }
      })(
        document.createElement("script"),
        document.getElementsByTagName("script")[0],
        "//cdn.taboola.com/libtrc/unip/1891183/tfa.js",
        "tb_tfa_script"
      );
    </script>
    <!-- End of Taboola Pixel Code -->
    <script src="/linkMarking.js"></script>
    <script>
      const searchParams = new URLSearchParams(window.location.search);
      const ttclid = searchParams.get("ttclid"); //TikTok
      const tblci = searchParams.get("tblci"); //Taboola
      ttclid && window.setCookie("hi_ttclid", ttclid);
      tblci && window.setCookie("hi_tblci", tblci);

      const script = document.createElement("script");
      script.src = "https://wc.bunchthings.com/youknowwho.js?" + Date.now();
      document.head.appendChild(script);
      script.onload = function () {
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({
          event: "Page_View_Ip",
          hi_ip: window.youknowwho_ip || "unknown",
          hi_country: window.youknowwho_ip_country || "unknown"
        });

        const pathname = window.location.pathname;
        if (pathname.startsWith("/detail")) {
          window.pushEventParamsToGtm("D_PV", ttclid);
        } else if (pathname.startsWith("/search/")) {
          window.pushEventParamsToGtm("S_PV", ttclid);
        }
      };
    </script>
    <script async="async" src="https://www.google.com/adsense/search/ads.js"></script>
    <script type="text/javascript" charset="utf-8">
      (function (g, o) {
        (g[o] =
          g[o] ||
          function () {
            (g[o]["q"] = g[o]["q"] || []).push(arguments);
          }),
          (g[o]["t"] = 1 * new Date());
      })(window, "_googCsa");
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GQ15KSXKDY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-GQ15KSXKDY");
    </script>
    <!-- Google Tag Manager -->
    <script>
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-KB6DD4F9");
    </script>
    <!-- End Google Tag Manager -->

    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in window.navigator) {
          window.navigator.serviceWorker
            .register("/sw.js")
            .then(() => {})
            .catch(() => {});
        }
        window.addEventListener("beforeinstallprompt", (e) => {
          e.preventDefault();
          window.deferredPrompt = e;
        });
      });
    </script>
  </head>
  <body {{ BODY_ATTRS }} tabindex="0">
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-KB6DD4F9"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    {{ APP }}
    <script>
      /* eslint-disable no-undef */
      window.pageLoadTime = performance.now();
      window.done = false;
      window.done1 = false;

      window.addEventListener("beforeunload", () => {
        if (!window.done) {
          // 处理 AFS 广告埋点逻辑
          const activeElement = document.activeElement;
          const src = activeElement?.getAttribute("src") || "";
          let eventName = "";
          if (window.location.pathname.startsWith("/detail")) {
            if (
              src &&
              src.includes("afs/ads?") &&
              activeElement.getAttribute("id") === "master-1"
            ) {
              dataLayer.push({ event: "T_AC_FIRST" });
            } else if (
              src &&
              src.includes("afs/ads/i/") &&
              activeElement.getAttribute("id") === "slave-1-1"
            ) {
              dataLayer.push({ event: "T_AC_SECOND" });
              // dataLayer.push({ event: "T_AC" });
              window.pushEventParamsToGtm("T_AC");
            }
          }
          if (src.includes("afs/ads?")) {
            if (activeElement.getAttribute("title")) {
              window._tfa = window._tfa || [];
              window._tfa.push({ notify: "event", name: "make_purchase", id: 1891183 });

              eventName = "T_AR";
            } else {
              eventName = "T_AC";
            }
          } else if (
            src.includes("afs/ads/i/") &&
            !window.location.pathname.startsWith("/detail")
          ) {
            eventName = "T_AG";
          }

          if (eventName) {
            // dataLayer.push({ event: eventName });
            window.pushEventParamsToGtm(eventName);
            window.done = true;
          }
        }
      });

      // 监听失去焦点事件
      window.addEventListener("blur", () => {
        const activeElement = document.activeElement;
        const sourceAttribute = activeElement.getAttribute("src");

        // afs埋点
        if (sourceAttribute && sourceAttribute.includes("afs/ads?")) {
          if (activeElement.getAttribute("title")) {
            dataLayer.push({ event: "D_AR" });
          } else {
            dataLayer.push({ event: "D_AC" });
          }
        }
      });

      window.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          setTimeout(() => {
            window.done = false;
            window.done1 = false;
            document.body.focus();
          }, 0);
        }
      });

      function HandleMessageTACANDTAR(e) {
        if (window.done1) {
          return;
        }
        const activeElement = document.activeElement;
        const src = activeElement?.getAttribute("src") || "";
        if (src.includes("afs/ads?")) {
          if (!activeElement.getAttribute("title")) {
            window._tfa = window._tfa || [];
            window._tfa.push({ notify: "event", name: "add_to_wishlist", id: 1891183 });

            dataLayer.push({ event: "T_AC_MSG" });
            window.done1 = true;
          }
        } else if (
          src &&
          src.includes("afs/ads/i/") &&
          activeElement.getAttribute("id") === "slave-1-1" &&
          window.location.pathname.startsWith("/detail")
        ) {
          window._tfa = window._tfa || [];
          window._tfa.push({ notify: "event", name: "add_to_wishlist", id: 1891183 });
          dataLayer.push({ event: "T_AC_MSG" });
          window.done1 = true;
        }
      }

      //TAC和TAR埋点监听消息
      window.addEventListener("message", (e) => {
        if (typeof e.data === "string" && e?.data?.startsWith("FSXDC,.aCS:")) {
          HandleMessageTACANDTAR();
        }
      });
    </script>
  </body>
</html>
